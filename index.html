<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>電車乗り換え検索</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Meiryo', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
            min-height: 100vh; color: #e2e8f0;
        }
        .container { max-width: 820px; margin: 0 auto; padding: 14px; }
        header { text-align: center; padding: 18px 0 12px; }
        header h1 { font-size: 22px; background: linear-gradient(90deg,#60a5fa,#34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        header p { font-size: 13px; color: #94a3b8; margin-top: 2px; }

        .card { background: rgba(30,41,59,0.85); backdrop-filter: blur(12px); border: 1px solid rgba(100,116,139,0.25); border-radius: 14px; padding: 16px; margin-bottom: 10px; }

        label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 2px; font-weight: 600; }
        input[type="text"], input[type="password"], input[type="number"], input[type="date"], input[type="time"], select, textarea {
            width: 100%; padding: 9px 11px;
            background: rgba(15,23,42,0.6); border: 1px solid rgba(100,116,139,0.35);
            border-radius: 9px; color: #e2e8f0; font-size: 16px; outline: none;
            transition: border-color 0.2s; -webkit-appearance: none;
        }
        select { -webkit-appearance: menulist; }
        input[type="text"]:focus, input[type="password"]:focus, input[type="number"]:focus, select:focus { border-color: #60a5fa; }
        input::placeholder { color: #64748b; }
        select { cursor: pointer; }
        select option { background: #1e293b; }

        .station-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
        .station-col { flex: 1; }
        .station-input-wrap { display: flex; gap: 5px; }
        .station-input-wrap input { flex: 1; }

        .icon-btn { background: rgba(96,165,250,0.12); border: 1px solid rgba(96,165,250,0.25); border-radius: 9px; color: #60a5fa; cursor: pointer; font-size: 12px; padding: 9px 8px; white-space: nowrap; transition: all 0.15s; display: flex; align-items: center; }
        .icon-btn:hover:not(:disabled) { background: rgba(96,165,250,0.25); }
        .icon-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .icon-btn.green { background: rgba(52,211,153,0.12); border-color: rgba(52,211,153,0.25); color: #34d399; }
        .icon-btn.green:hover:not(:disabled) { background: rgba(52,211,153,0.25); }
        .icon-btn.locating { animation: pulse 1s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        .swap-btn { background: rgba(96,165,250,0.12); border: 1px solid rgba(96,165,250,0.25); border-radius: 50%; width: 34px; height: 34px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #60a5fa; font-size: 15px; margin-top: 18px; transition: all 0.15s; flex-shrink: 0; }
        .swap-btn:hover { background: rgba(96,165,250,0.3); }

        .sub-text { font-size: 13px; color: #94a3b8; margin-top: 2px; }
        .sub-text.ok { color: #34d399; }
        .sub-text.err { color: #fca5a5; }

        .via-row { margin-bottom: 10px; }

        .options-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; margin-bottom: 10px; }
        .check-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
        .check-label { display: flex; align-items: center; gap: 5px; font-size: 13px; color: #cbd5e1; cursor: pointer; }
        .check-label input[type="checkbox"] { width: 16px; height: 16px; accent-color: #60a5fa; cursor: pointer; }

        .detail-toggle { font-size: 12px; color: #64748b; cursor: pointer; margin-bottom: 10px; border: none; background: none; }
        .detail-toggle:hover { color: #94a3b8; }
        .detail-section { display: none; margin-bottom: 12px; }
        .detail-section.open { display: block; }

        .transport-row { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 10px; }
        .transport-chip { padding: 5px 10px; border-radius: 8px; font-size: 12px; border: 1px solid rgba(100,116,139,0.35); background: rgba(15,23,42,0.5); color: #cbd5e1; cursor: pointer; transition: all 0.15s; user-select: none; }
        .transport-chip.off { opacity: 0.35; text-decoration: line-through; border-color: rgba(239,68,68,0.3); }

        .search-btn { width: 100%; padding: 12px; background: linear-gradient(135deg,#3b82f6,#2563eb); border: none; border-radius: 11px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 7px; }
        .search-btn:hover:not(:disabled) { transform: translateY(-1px); }
        .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .toolbar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
        .tool-btn { padding: 7px 11px; border-radius: 9px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid rgba(100,116,139,0.3); background: rgba(30,41,59,0.9); color: #cbd5e1; transition: all 0.15s; }
        .tool-btn:hover { background: rgba(96,165,250,0.15); color: #93c5fd; }
        .tool-btn.active { background: rgba(96,165,250,0.2); color: #60a5fa; border-color: #60a5fa; }
        .tool-btn.orange { color: #fbbf24; border-color: rgba(251,191,36,0.3); }
        .tool-btn.green2 { color: #34d399; border-color: rgba(52,211,153,0.3); }

        .route-card { background: rgba(30,41,59,0.85); border: 1px solid rgba(100,116,139,0.25); border-radius: 14px; margin-bottom: 10px; overflow: hidden; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

        .route-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: rgba(96,165,250,0.08); border-bottom: 1px solid rgba(100,116,139,0.15); flex-wrap: wrap; gap: 6px; }
        .route-label { font-size: 13px; font-weight: 700; color: #60a5fa; }
        .route-time-big { font-size: 20px; font-weight: 700; color: #f1f5f9; letter-spacing: -0.5px; }
        .route-time-big .arr { color: #34d399; }
        .route-meta { display: flex; gap: 8px; flex-wrap: wrap; }
        .route-badge { padding: 3px 8px; border-radius: 6px; font-size: 13px; font-weight: 600; }
        .badge-duration { background: rgba(96,165,250,0.15); color: #93c5fd; }
        .badge-transfer { background: rgba(251,191,36,0.12); color: #fde68a; }
        .badge-fare { background: rgba(52,211,153,0.12); color: #6ee7b7; }

        .route-timeline { padding: 12px 16px 12px 20px; }
        .tl-segment { position: relative; padding-left: 28px; padding-bottom: 0; }
        .tl-segment:last-child { padding-bottom: 0; }
        .tl-line { position: absolute; left: 8px; top: 18px; bottom: 0; width: 4px; border-radius: 2px; }
        .tl-dot { position: absolute; left: 3px; top: 5px; width: 14px; height: 14px; border-radius: 50%; border: 3px solid; background: #0f172a; z-index: 1; }
        .tl-dot.start { border-color: #60a5fa; background: #60a5fa; }
        .tl-dot.end { border-color: #34d399; background: #34d399; }
        .tl-dot.transfer { border-color: #fbbf24; background: #fbbf24; }

        .tl-station { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
        .tl-station-time { font-size: 15px; font-weight: 700; color: #f1f5f9; min-width: 42px; font-variant-numeric: tabular-nums; }
        .tl-station-name { font-size: 14px; font-weight: 600; color: #e2e8f0; }
        .tl-station-platform { font-size: 13px; color: #94a3b8; margin-left: 4px; }

        .tl-ride { padding: 6px 0 6px 0; margin-left: 0; }
        .tl-ride-line { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 6px; font-size: 13px; font-weight: 600; margin-bottom: 3px; }
        .line-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 28px; height: 28px; border-radius: 50%; font-size: 11px; font-weight: 800; color: #fff; letter-spacing: -0.5px; line-height: 1; padding: 0 3px; flex-shrink: 0; border: 2px solid rgba(255,255,255,0.3); }
        .tl-ride-detail { font-size: 13px; color: #94a3b8; line-height: 1.5; }
        .tl-ride-detail span { margin-right: 10px; }

        .tl-stops-toggle { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; margin: 2px 0 0; border: 1px solid rgba(100,116,139,0.2); border-radius: 6px; font-size: 13px; color: #64748b; cursor: pointer; background: rgba(15,23,42,0.3); transition: all 0.15s; }
        .tl-stops-toggle:hover { color: #94a3b8; border-color: rgba(100,116,139,0.4); }
        .tl-stops-toggle .arrow { transition: transform 0.2s; display: inline-block; }
        .tl-stops-toggle.open .arrow { transform: rotate(90deg); }
        .tl-stops-list { display: none; margin: 4px 0 2px; padding: 0; }
        .tl-stops-list.open { display: block; }
        .tl-stop { display: flex; align-items: center; gap: 8px; padding: 2px 0; position: relative; }
        .tl-stop-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .tl-stop-time { font-size: 13px; color: #94a3b8; min-width: 38px; font-variant-numeric: tabular-nums; }
        .tl-stop-name { font-size: 13px; color: #94a3b8; }

        .tl-transfer-box { display: flex; align-items: center; gap: 6px; padding: 5px 10px; margin: 4px 0; background: rgba(251,191,36,0.08); border: 1px dashed rgba(251,191,36,0.25); border-radius: 8px; font-size: 13px; color: #fde68a; }

        .route-notes { padding: 8px 16px 12px; border-top: 1px solid rgba(100,116,139,0.12); }
        .route-notes p { font-size: 13px; color: #94a3b8; line-height: 1.5; margin-bottom: 2px; }
        .route-notes .warn { color: #fca5a5; }

        .result-card { background: rgba(30,41,59,0.85); border: 1px solid rgba(100,116,139,0.25); border-radius: 14px; padding: 16px; margin-bottom: 10px; animation: fadeIn 0.3s ease; }
        .result-card h3 { color: #60a5fa; margin-bottom: 10px; font-size: 14px; }
        .result-content { line-height: 1.75; font-size: 13px; color: #cbd5e1; }
        .result-content h1,.result-content h2,.result-content h3,.result-content h4 { color: #60a5fa; margin: 10px 0 4px; }
        .result-content h1{font-size:17px} .result-content h2{font-size:15px} .result-content h3{font-size:14px}
        .result-content p { margin-bottom: 6px; }
        .result-content strong { color: #f1f5f9; }
        .result-content ul, .result-content ol { padding-left: 20px; margin-bottom: 6px; }
        .result-content li { margin-bottom: 2px; }
        .result-content a { color: #38bdf8; text-decoration: none; }
        .result-content table { width: 100%; border-collapse: collapse; margin: 8px 0; }
        .result-content th, .result-content td { border: 1px solid rgba(100,116,139,0.3); padding: 5px 8px; text-align: left; font-size: 13px; }
        .result-content th { background: rgba(96,165,250,0.1); color: #60a5fa; }

        .sources { margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(100,116,139,0.15); }
        .sources h4 { font-size: 13px; color: #64748b; margin-bottom: 4px; }
        .sources a { display: inline-block; font-size: 13px; color: #38bdf8; text-decoration: none; margin-right: 10px; }

        .loading { text-align: center; padding: 28px; }
        .spinner { width: 30px; height: 30px; border: 3px solid rgba(96,165,250,0.2); border-top-color: #60a5fa; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 8px; }
        @keyframes spin { to{transform:rotate(360deg)} }
        .loading p { color: #94a3b8; font-size: 12px; }

        .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 11px; padding: 12px; color: #fca5a5; font-size: 12px; margin-bottom: 10px; }

        .alarm-bar { display: none; align-items: center; gap: 10px; padding: 10px 14px; background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.3); border-radius: 11px; margin-bottom: 10px; }
        .alarm-bar.active { display: flex; }
        .alarm-time { font-size: 24px; font-weight: 700; color: #fbbf24; font-variant-numeric: tabular-nums; }
        .alarm-label { flex: 1; font-size: 13px; color: #fde68a; }
        .alarm-cancel { padding: 5px 12px; border-radius: 7px; border: 1px solid rgba(251,191,36,0.4); background: transparent; color: #fbbf24; cursor: pointer; font-size: 12px; }

        .expense-bar { background: rgba(139,92,246,0.08); border: 1px solid rgba(139,92,246,0.2); border-radius: 11px; padding: 10px 14px; margin-bottom: 10px; }
        .expense-bar h4 { font-size: 12px; color: #a78bfa; margin-bottom: 6px; }
        .expense-list { font-size: 13px; color: #c4b5fd; }
        .expense-list .item { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px solid rgba(139,92,246,0.1); }
        .expense-total { display: flex; justify-content: space-between; font-weight: 700; color: #a78bfa; padding-top: 4px; font-size: 13px; }
        .expense-actions { display: flex; gap: 6px; margin-top: 6px; }
        .expense-actions button { padding: 3px 10px; border-radius: 7px; border: 1px solid rgba(139,92,246,0.3); background: transparent; color: #a78bfa; cursor: pointer; font-size: 13px; }

        .section-title { color: #94a3b8; font-size: 12px; margin-bottom: 6px; font-weight: 600; }
        .tag { display: inline-flex; align-items: center; gap: 4px; background: rgba(96,165,250,0.08); border: 1px solid rgba(96,165,250,0.18); border-radius: 18px; padding: 4px 11px; font-size: 13px; color: #93c5fd; cursor: pointer; margin: 0 5px 5px 0; }
        .tag:hover { background: rgba(96,165,250,0.18); }
        .tag .del { color: #64748b; margin-left: 2px; font-size: 13px; }
        .tag .del:hover { color: #fca5a5; }
        .tag.fav { border-color: rgba(251,191,36,0.25); color: #fde68a; background: rgba(251,191,36,0.06); }

        .settings-toggle { text-align: right; margin-bottom: 6px; }
        .settings-toggle button { background: none; border: none; color: #64748b; cursor: pointer; font-size: 12px; }
        .settings-toggle button:hover { color: #94a3b8; }
        .settings-panel { display: none; margin-bottom: 10px; }
        .settings-panel.open { display: block; }

        .crowd-bar { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 6px; font-size: 12px; vertical-align: middle; }
        .crowd-bar .crowd-icons { display: inline-flex; margin-left: -2px; letter-spacing: -6px; }
        .crowd-bar .ci { font-size: 14px; opacity: 0.2; }
        .crowd-bar .ci.on { opacity: 1; }
        .crowd-bar .crowd-label { margin-left: 3px; font-weight: 600; }
        .crowd-1 { background: rgba(52,211,153,0.1); color: #34d399; }
        .crowd-2 { background: rgba(96,165,250,0.1); color: #60a5fa; }
        .crowd-3 { background: rgba(251,191,36,0.1); color: #fbbf24; }
        .crowd-4 { background: rgba(249,115,22,0.1); color: #f97316; }
        .crowd-5 { background: rgba(239,68,68,0.12); color: #ef4444; }

        .tl-delay { display: flex; align-items: center; gap: 6px; padding: 6px 12px; margin: 4px 0; background: rgba(249,115,22,0.08); border: 1px solid rgba(249,115,22,0.25); border-radius: 8px; }
        .tl-delay-icon { color: #f97316; font-size: 16px; flex-shrink: 0; }
        .tl-delay-text { font-size: 13px; font-weight: 600; color: #f97316; }
        .tl-delay-reason { font-size: 12px; color: #fb923c; font-weight: 400; margin-left: 4px; }

        .verify-badge { display: none; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 8px; font-size: 13px; font-weight: 600; margin-bottom: 10px; }
        .verify-badge.verifying { display: inline-flex; background: rgba(96,165,250,0.1); border: 1px solid rgba(96,165,250,0.25); color: #93c5fd; }
        .verify-badge.done { display: inline-flex; background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.25); color: #34d399; }
        .verify-badge.corrected { display: inline-flex; background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.25); color: #fde68a; animation: pulse 2s ease-in-out; }

        .info-banner { display: none; padding: 8px 12px; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: 11px; margin-bottom: 10px; font-size: 12px; color: #fca5a5; }
        .info-banner.show { display: block; }
        .info-banner.ok { background: rgba(52,211,153,0.08); border-color: rgba(52,211,153,0.2); color: #34d399; }

        /* [修正7] 混雑度推定ラベル */
        .crowd-estimate-label { font-size: 10px; color: #64748b; font-weight: 400; margin-left: 2px; }

        /* [修正8] 到着駅不一致バナー */
        .dest-warn-banner { padding: 8px 12px; background: rgba(249,115,22,0.1); border: 1px solid rgba(249,115,22,0.3); border-radius: 10px; margin-bottom: 10px; font-size: 13px; color: #fb923c; font-weight: 600; }

        /* [修正5] 運賃注記バナー */
        .fare-warn-banner { padding: 6px 12px; background: rgba(139,92,246,0.08); border: 1px solid rgba(139,92,246,0.2); border-radius: 8px; margin-bottom: 8px; font-size: 12px; color: #a78bfa; }

        .mode-tabs { display: flex; margin-bottom: 10px; border-radius: 10px; overflow: hidden; border: 1px solid rgba(100,116,139,0.3); }
        .mode-tab { flex: 1; padding: 9px; text-align: center; font-size: 13px; font-weight: 600; cursor: pointer; background: rgba(15,23,42,0.5); color: #94a3b8; border: none; }
        .mode-tab.active { background: rgba(96,165,250,0.15); color: #60a5fa; }

        @media (max-width: 600px) {
            .station-row { flex-direction: column; }
            .swap-btn { margin-top: 0; align-self: center; transform: rotate(90deg); }
            .options-grid { grid-template-columns: 1fr 1fr; }
            .route-time-big { font-size: 18px; }
        }
    </style>
</head>
<body>
<div class="container">

    <div class="settings-toggle"><button onclick="document.getElementById('settingsPanel').classList.toggle('open')">API設定</button></div>
    <div class="settings-panel" id="settingsPanel">
        <div class="card">
            <label>OpenAI API Key</label>
            <input type="password" id="apiKey" placeholder="sk-proj-..." />
            <div style="margin-top:8px;">
                <label>検索方式</label>
                <div class="sub-text" style="line-height:1.6;">
                    Step1: <strong style="color:#60a5fa;">GPT-4o mini search</strong>（高速検索）<br>
                    Step2: <strong style="color:#34d399;">GPT-5.4 mini</strong>（バックグラウンド検証・修正）
                </div>
            </div>
            <div style="margin-top:8px;">
                <label>タイムアウト（秒）</label>
                <input type="number" id="timeoutSec" value="120" min="30" max="600" style="width:120px;" />
            </div>
            <div style="margin-top:12px;padding-top:10px;border-top:1px solid rgba(100,116,139,0.2);">
                <label>ODPT APIキー（任意・無料登録）</label>
                <input type="password" id="odptKey" placeholder="未設定でもPublic APIで動作します" />
                <div class="sub-text">時刻表・運行情報をリアルタイムデータで補強。<a href="https://developer.odpt.org/signup" target="_blank" style="color:#38bdf8;">登録はこちら</a></div>
            </div>
        </div>
    </div>

    <div class="mode-tabs">
        <button class="mode-tab active" onclick="setMode('route')" id="modeRoute">経路検索</button>
        <button class="mode-tab" onclick="setMode('timetable')" id="modeTimetable">時刻表</button>
        <button class="mode-tab" onclick="setMode('commuter')" id="modeCommuter">定期代</button>
        <button class="mode-tab" onclick="setMode('status')" id="modeStatus">運行情報</button>
    </div>

    <div class="info-banner" id="infoBanner"></div>

    <div class="card" id="searchForm">
        <div class="station-row">
            <div class="station-col">
                <label>出発駅</label>
                <div class="station-input-wrap">
                    <input type="text" id="fromStation" placeholder="例: 東京" />
                    <button class="icon-btn green" id="gpsBtn" onclick="detectStation()">GPS</button>
                    <button class="icon-btn" onclick="voiceInput('fromStation')">MIC</button>
                </div>
                <div id="gpsStatus" class="sub-text" style="display:none;"></div>
            </div>
            <button class="swap-btn" onclick="swapStations()">&#8652;</button>
            <div class="station-col">
                <label>到着駅</label>
                <div class="station-input-wrap">
                    <input type="text" id="toStation" placeholder="例: 大阪" />
                    <button class="icon-btn" onclick="voiceInput('toStation')">MIC</button>
                </div>
            </div>
        </div>

        <div class="via-row" id="viaRow">
            <label>経由駅（任意）</label>
            <input type="text" id="viaStation" placeholder="例: 新宿（カンマ区切りで複数可）" />
        </div>

        <div class="options-grid" id="optionsGrid">
            <div><label>日付</label><input type="date" id="date" /></div>
            <div><label>時刻 <span id="liveClock" style="color:#34d399;font-weight:400;cursor:pointer;" onclick="updateNow()"></span></label><input type="time" id="time" /></div>
            <div><label>条件</label><select id="timeType"><option value="departure">出発時刻指定</option><option value="arrival">到着時刻指定</option><option value="first">始発</option><option value="last">終電</option></select></div>
            <div><label>優先</label><select id="priority"><option value="recommended">おすすめ</option><option value="fast">速い</option><option value="cheap">安い</option><option value="less_transfer">乗換少</option></select></div>

// ===== [修正6] GPS → HeartRails Express API で最寄り駅検索 =====
async function detectStation(){
    const btn=document.getElementById('gpsBtn'),st=document.getElementById('gpsStatus');st.style.display='block';
    if(!navigator.geolocation){st.textContent='GPS非対応';st.className='sub-text err';return;}
    btn.disabled=true;btn.classList.add('locating');btn.textContent='...';st.textContent='位置情報を取得中...';st.className='sub-text';
    try {
        const pos = await new Promise((ok,ng)=>navigator.geolocation.getCurrentPosition(ok,ng,{enableHighAccuracy:true,timeout:15000,maximumAge:0}));
        const lat=pos.coords.latitude, lng=pos.coords.longitude;
        st.textContent=`${lat.toFixed(4)}, ${lng.toFixed(4)} — 最寄り駅を検索中...`;

        // HeartRails Express API（無料・登録不要）で最寄り駅を取得
        const url = `https://express.heartrails.com/api/json?method=getStations&x=${lng}&y=${lat}`;
        const res = await fetch(url, { signal: AbortSignal.timeout(10000) });
        if (!res.ok) throw new Error(`HeartRails API Error: ${res.status}`);
        const data = await res.json();

        if (data.response && data.response.station && data.response.station.length > 0) {
            const nearest = data.response.station[0];
            const name = nearest.name.replace(/駅$/, '');
            document.getElementById('fromStation').value = name;
            const dist = nearest.distance ? ` (${nearest.distance})` : '';
            st.textContent = `最寄り駅: ${name}${dist} [${nearest.line || ''}]`;
            st.className = 'sub-text ok';
        } else {
            // HeartRails失敗時 → LLMフォールバック
            const apiKey = getApiKey();
            if (!apiKey) { st.textContent='APIキーを先に設定'; st.className='sub-text err'; return; }
            const aiData = await callAPI(apiKey, `緯度${lat}, 経度${lng}に最も近い日本の鉄道駅名を1つだけ（「駅」除く）答えて。例:渋谷`, 'low', 256);
            let name = (aiData.output_text||'').trim().replace(/駅$/,'').split('\n')[0].trim();
            document.getElementById('fromStation').value = name;
            st.textContent = `最寄り駅: ${name}（AI推定）`; st.className = 'sub-text ok';
        }
    } catch(err) {
        const errMsg = ({1:'位置情報の許可が必要',2:'位置情報が利用不可',3:'タイムアウト'})[err.code] || err.message || '取得失敗';
        st.textContent = errMsg; st.className = 'sub-text err';
    } finally {
        btn.disabled=false; btn.classList.remove('locating'); btn.textContent='GPS';
    }
}

async function searchRoute(overrideTime){
    const apiKey=getApiKey();if(!apiKey){showError('APIキーを設定してください。');return;}
    const from=document.getElementById('fromStation').value.trim(),to=document.getElementById('toStation').value.trim();
    if(!from||!to){showError('出発駅と到着駅を入力してください。');return;}
    if(!overrideTime)updateNow();
    const date=document.getElementById('date').value,time=overrideTime||document.getElementById('time').value;
    const via=document.getElementById('viaStation').value.trim();
    const sel=id=>{const s=document.getElementById(id);return s.options[s.selectedIndex].text;};
    lastSearchParams={from,to,via,date,time,timeTypeText:sel('timeType'),priorityText:sel('priority'),walkText:sel('walkSpeed'),
        barrierFree:document.getElementById('optBarrierFree').checked,boardingPos:document.getElementById('optBoardingPos').checked,
        doorSide:document.getElementById('optDoorSide').checked,crowding:true,
        avoidDelay:document.getElementById('optAvoidDelay').checked,commuterPass:document.getElementById('optCommuterPass').checked,
        passFrom:document.getElementById('passFrom').value.trim(),passTo:document.getElementById('passTo').value.trim(),
        excluded:[...document.querySelectorAll('.transport-chip.off')].map(c=>c.dataset.key),
        trainName:document.getElementById('trainName').value.trim(),specialTicket:document.getElementById('specialTicket').value,
        freepassName:document.getElementById('freepassName').value.trim()};
    addHistory(from,to);

    const viaStations = via ? via.split(/[,、，\s]+/).filter(s=>s).map(s=>s.replace(/駅$/,'')) : [];
    if(viaStations.length){
        isSegmentedResult = true;
        await runSegmentedSearch(apiKey, lastSearchParams, [from, ...viaStations, to]);
    } else {
        isSegmentedResult = false;
        await runSearch(buildRoutePrompt(lastSearchParams),true);
    }
}
async function searchTimetable(){

            document.getElementById('results').innerHTML = odptHtml;
            document.getElementById('toolbar').style.display = 'none';
            return;
        }
    } catch {}
    const apiKey=getApiKey();if(!apiKey){showError('APIキーを設定してください。');setLoading(false);return;}
    try {
        const data=await callAPI(apiKey,`ウェブ検索で${from}駅${to?'から'+to+'方面':''}の本日(${document.getElementById('date').value})の時刻表を調べて。直近10本を表形式(時刻|路線|種別|行先|番線)で、始発終電も記載。日本語で回答。`,'medium',16000);

async function checkServiceStatus(){
    const from=document.getElementById('fromStation').value.trim(),to=document.getElementById('toStation').value.trim();
    if(currentMode==='status'){
        setLoading(true);
        try {
            const odptData = await fetchOdptTrainInfo();

            if (odptHtml) {

                document.getElementById('toolbar').style.display = 'none';
                setLoading(false);
                return;
            }
        } catch(err) { console.warn('[ODPT] 運行情報取得失敗:', err.message); }
        const apiKey=getApiKey();if(!apiKey){showError('APIキーを設定してください。');setLoading(false);return;}
        const area=from||to||'首都圏';
        try{const data=await callAPI(apiKey,`ウェブ検索で${area}エリアの鉄道の最新運行情報をまとめて。遅延・運休路線をリスト、異常なしは「平常運転」。日本語で回答。`,'medium',8000);lastResultText=data.output_text||'';displayFallback(data);document.getElementById('toolbar').style.display='none';}catch(err){showError(`エラー: ${err.message}`);}finally{setLoading(false);}
        return;
    }
    const banner=document.getElementById('infoBanner');banner.className='info-banner show';banner.textContent='運行情報を確認中...';
    try {
        const odptData = await fetchOdptTrainInfo();
        if (odptData && odptData.length) {
            const alerts = odptData.filter(i => i['odpt:trainInformationText'] && !['平常運転','平常'].includes(i['odpt:trainInformationText']?.trim().slice(0,4)));
            if (alerts.length === 0) {
                banner.innerHTML = '<strong>運行情報:</strong> 全路線 平常運転（ODPT）';
                banner.className = 'info-banner show ok';
            } else {

// ===== [修正2] 経由駅あり: 区間ごとに直列API呼び出し（前区間の到着時刻を次区間の出発条件にする） =====
async function runSegmentedSearch(apiKey, params, stations){
    if(verifyAbort){verifyAbort.abort();verifyAbort=null;}
    setLoading(true);
    const segments = [];
    for(let i=0;i<stations.length-1;i++){
        segments.push({from: stations[i], to: stations[i+1]});
    }
    console.log('[Segmented] 区間:', segments.map(s=>`${s.from}→${s.to}`).join(', '));

    try{
        const allSegRoutes = [];
        let currentDepartureTime = params.time; // 最初は指定時刻

        // [修正2] 直列実行: 前区間の到着時刻を次区間の出発時刻に使う
        for(let idx=0; idx<segments.length; idx++){
            const seg = segments[idx];
            const segParams = {...params, from: seg.from, to: seg.to, via: '', time: currentDepartureTime, timeTypeText: '出発時刻指定'};
            const prompt = buildRoutePrompt(segParams);
            console.log(`[Segmented] 区間${idx+1} (${seg.from}→${seg.to}) 出発時刻=${currentDepartureTime} 検索開始`);

            const data = await callAPI(apiKey, prompt, 'high', 16000);
            console.log(`[Segmented] 区間${idx+1} output_text length:`, (data.output_text||'').length);

            const text = data.output_text || '';
            let parsed = null;
            try{
                let cleaned = text.replace(/【[^】]*】/g, '');
                let jsonStr = cleaned;
                const m1 = cleaned.match(/```(?:json)?\s*([\s\S]*?)```/);
                if(m1) jsonStr = m1[1];
                else { const m2 = cleaned.match(/\{[\s\S]*?"routes"\s*:\s*\[[\s\S]*\]/); if(m2){ let s=m2[0],depth=0,end=0; for(let j=0;j<s.length;j++){if(s[j]==='{')depth++;else if(s[j]==='}'){depth--;if(depth===0){end=j+1;break;}}} if(end>0)jsonStr=s.slice(0,end); }}
                jsonStr = jsonStr.trim().replace(/,\s*([}\]])/g, '$1');
                parsed = JSON.parse(jsonStr);
            }catch(e){ console.log(`[Segmented] 区間${idx+1} JSON解析失敗:`, e.message); }

            if(parsed && parsed.routes && parsed.routes.length){
                const route = parsed.routes[0];
                allSegRoutes.push({segIndex:idx, from:seg.from, to:seg.to, route});

                // [修正2] 到着時刻を取得して次区間の出発時刻に設定
                const arrivalTime = route.arrival;
                if(arrivalTime && idx < segments.length - 1){
                    // 到着時刻に乗換時間を加算して次区間の出発時刻にする
                    const lastRideSeg = (route.segments||[]).filter(s=>s.type==='ride').pop();
                    const prevLine = lastRideSeg ? lastRideSeg.line : '';
                    const transferMin = getTransferMinutes(seg.to, prevLine, '');
                    currentDepartureTime = addMinutesToTime(arrivalTime, transferMin);
                    console.log(`[Segmented] 区間${idx+1} 到着=${arrivalTime} → 乗換${transferMin}分 → 次区間出発=${currentDepartureTime}`);
                }
            } else {
                console.log(`[Segmented] 区間${idx+1} (${seg.from}→${seg.to}) 取得失敗 → 一括検索にフォールバック`);
                await runSearch(buildRoutePrompt(params), true);
                return;
            }
        }

        // 全区間成功 → 結合
        console.log('[Segmented] 全区間成功 → 結合');
        const combined = combineSegmentRoutes(allSegRoutes);

        // [修正2] 接続時刻の整合性検証
        const timeErrors = validateSegmentConnections(allSegRoutes);
        if(timeErrors.length){
            combined.routes[0].notes = combined.routes[0].notes || [];
            timeErrors.forEach(e => combined.routes[0].notes.push(e));
        }

        const fakeData = {output_text: JSON.stringify(combined)};
        lastResultText = fakeData.output_text;
        lastParsedRoutes = combined;
        renderRouteCards(combined, fakeData);
        document.getElementById('toolbar').style.display='flex';updateFavBtn();
        saveCacheWithKey(lastSearchParams, lastResultText, lastParsedRoutes);

        console.log('[Segmented] → Step2検証を開始');
        startVerification(apiKey, combined);
    }catch(err){
        console.log('[Segmented] エラー:', err);
        showError(`エラー: ${err.message}`);
    }finally{setLoading(false);}
}

// [修正2] 時刻に分を加算するユーティリティ
function addMinutesToTime(timeStr, minutes) {
    const [h,m] = (timeStr||'0:0').split(':').map(Number);
    const total = h * 60 + m + minutes;
    const nh = Math.floor(total / 60) % 24;
    const nm = total % 60;
    return `${String(nh).padStart(2,'0')}:${String(nm).padStart(2,'0')}`;
}

// [修正2] 区間間の接続時刻を検証
function validateSegmentConnections(segRoutes) {
    const errors = [];
    for(let i=0; i<segRoutes.length-1; i++){
        const prevArr = segRoutes[i].route.arrival;
        const nextDep = segRoutes[i+1].route.departure;
        if(prevArr && nextDep){
            const prevMin = timeToMin(prevArr);
            const nextMin = timeToMin(nextDep);
            // 日付またぎ考慮（6時間以上の差があれば日付またぎとみなす）
            const diff = nextMin >= prevMin ? nextMin - prevMin : nextMin + 1440 - prevMin;
            if(diff < 0 || (nextMin < prevMin && diff > 360)){
                errors.push(`⚠ 区間${i+1}の到着(${prevArr})と区間${i+2}の出発(${nextDep})の接続に矛盾があります`);
            }
            if(diff < 2 && diff >= 0){
                errors.push(`⚠ ${segRoutes[i].to}での乗換時間が${diff}分と非常に短いです。余裕を持った行動をお勧めします`);
            }
        }
    }
    return errors;
}

function combineSegmentRoutes(segRoutes){
    const allSegments = [];
    let totalFare = 0, totalIcFare = 0, totalTransfers = 0;
    const dep = segRoutes[0].route.departure;
    const arr = segRoutes[segRoutes.length-1].route.arrival;

    segRoutes.forEach((sr, idx) => {
        const r = sr.route;
        const fareNum = parseInt((r.fare||'').replace(/[^0-9]/g,''))||0;
        const icFareNum = parseInt((r.icFare||'').replace(/[^0-9]/g,''))||0;
        totalFare += fareNum;
        totalIcFare += icFareNum;
        totalTransfers += (r.transfers||0);

        if(r.segments) r.segments.forEach(s => allSegments.push(s));

        // [修正3] 乗換時間を駅テーブルから取得
        if(idx < segRoutes.length - 1){
            const lastSeg = r.segments?.[r.segments.length-1];
            if(lastSeg && lastSeg.type !== 'transfer'){
                const prevLine = lastSeg ? lastSeg.line : '';
                const nextRoute = segRoutes[idx+1].route;
                const nextFirstRide = (nextRoute.segments||[]).find(s=>s.type==='ride');
                const nextLine = nextFirstRide ? nextFirstRide.line : '';
                const transferMin = getTransferMinutes(sr.to, prevLine, nextLine);
                totalTransfers++;
                allSegments.push({type:'transfer', station: sr.to, minutes: transferMin});
            }
        }
    });

    const depMin = timeToMin(dep), arrMin = timeToMin(arr);
    const diff = arrMin >= depMin ? arrMin - depMin : arrMin + 1440 - depMin;
    const durH = Math.floor(diff/60), durM = diff%60;
    const duration = durH > 0 ? `${durH}時間${durM}分` : `${durM}分`;

    return {
        routes: [{
            departure: dep, arrival: arr, duration,
            transfers: totalTransfers,
            fare: `${totalFare}円`, icFare: `${totalIcFare}円`,
            expressFare: null,
            segments: allSegments,
            notes: ['経由駅指定のため区間分割検索で結合', '※運賃は区間ごとの合算です。通し運賃とは異なる場合があります']
        }],
        serviceInfo: '平常運転'
    };
}

          "lineCode": "路線記号（例: JY, M, G, TY, OH等。不明なら空文字）",
          "direction": "○○方面",
          "trainType": "種別（快速等）",
          "departureTime": "HH:MM",
          "arrivalTime": "HH:MM",
          "stops": [
            {"name": "途中駅名", "time": "HH:MM"},
            {"name": "途中駅名", "time": "HH:MM"}
          ]${optFields},
          "delay": null または {"minutes": 遅延分数, "reason": "遅延理由（簡潔に）"}
        },
        {
          "type": "transfer",
          "station": "乗換駅名",
          "minutes": 乗換時間(数値)
        }
      ],
      "notes": ["注意事項があれば"]
    }
  ],
  "serviceInfo": "運行情報（異常なしなら'平常運転'）"
}
\`\`\`

最大3ルート。各rideセグメントのstopsには出発駅・到着駅を除く全ての途中停車駅と各駅の到着予想時刻を含めてください。番線はウェブ検索で調べ、不明なら"要確認"。

【混雑度について】各rideセグメントに必ず"crowding"フィールド（1〜5の整数）を含めてください。時間帯・路線・方面から推定してください。朝ラッシュ（7:30-9:30）や夕ラッシュ（17:00-20:00）の都心方面は4〜5、逆方向や日中は1〜3が目安です。

【遅延情報について】各rideセグメントの路線に現在遅延・運転見合わせがあるかウェブ検索で確認してください。遅延がある場合は"delay": {"minutes": 遅延分数, "reason": "理由"}を設定。遅延がなければ"delay": nullとしてください。

【正確性に関する絶対ルール】
- 実在しない直通列車を絶対に捏造しないでください。ウェブ検索で確認できた実在する列車・路線のみ使用してください。
- 各rideセグメントの"from"と"to"は、その路線で実際に直通で行ける区間でなければなりません。
- 途中で乗り換えが必要な場合は、必ずtransferセグメントを挟んで複数のrideに分けてください。
- 除外した交通手段（新幹線等）を使わずに到達不可能または非現実的に長時間かかる場合は、notesに「除外条件により大幅に所要時間が増加します」と記載してください。`;
}

const ODPT_PUBLIC = 'https://api-public.odpt.org/api/v4/';

function getOdptBase() { const key = document.getElementById('odptKey').value.trim(); return key ? ODPT_AUTH : ODPT_PUBLIC; }
function odptKeyParam() { const key = document.getElementById('odptKey').value.trim(); return key ? `&acl:consumerKey=${encodeURIComponent(key)}` : ''; }

// [修正9] ODPT APIエラーハンドリング改善
async function fetchOdptTrainInfo() {
    try {
        const url = `${getOdptBase()}odpt:TrainInformation?${odptKeyParam()}`;
        const res = await fetch(url, { signal: AbortSignal.timeout(10000) });
        if (!res.ok) {
            console.warn(`[ODPT] 運行情報API エラー: HTTP ${res.status}`);
            return null;
        }
        return await res.json();
    } catch(err) {
        console.warn('[ODPT] 運行情報取得失敗:', err.message);
        return null;
    }
}

async function fetchOdptStationTimetable(stationName) {
    try {
        const stUrl = `${getOdptBase()}odpt:Station?dc:title=${encodeURIComponent(stationName)}${odptKeyParam()}`;
        const stRes = await fetch(stUrl, { signal: AbortSignal.timeout(10000) });
        if (!stRes.ok) {
            console.warn(`[ODPT] 駅検索API エラー: HTTP ${stRes.status}`);
            return null;
        }
        const stations = await stRes.json();
        if (!stations.length) { console.warn(`[ODPT] 駅「${stationName}」が見つかりません`); return null; }
        const results = [];
        for (const st of stations.slice(0, 3)) {
            const ttUrl = `${getOdptBase()}odpt:StationTimetable?odpt:station=${encodeURIComponent(st['owl:sameAs'])}${odptKeyParam()}`;
            const ttRes = await fetch(ttUrl, { signal: AbortSignal.timeout(10000) });
            if (ttRes.ok) {
                const tt = await ttRes.json();
                results.push(...tt);
            } else {
                console.warn(`[ODPT] 時刻表API エラー: HTTP ${ttRes.status} (${st['owl:sameAs']})`);
            }
        }
        return results.length ? results : null;
    } catch(err) {
        console.warn('[ODPT] 時刻表取得失敗:', err.message);
        return null;
    }
}

// [修正7] AbortController/timeout修正: finallyでclearTimeoutを保証
async function callChatCompletionsAPI(apiKey, input, model, maxTok, signal) {
    const timeoutMs = (parseInt(document.getElementById('timeoutSec').value) || 120) * 1000;
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    const onExtAbort = () => controller.abort();
    if (signal) signal.addEventListener('abort', onExtAbort);

    console.log(`[API-ChatCompletions] model=${model} timeout=${timeoutMs}ms`);
    try {
        const body = {
            model,
            web_search_options: { user_location: { type: 'approximate', approximate: { country: 'JP' } } },
            messages: [{ role: 'user', content: input }],
            max_tokens: maxTok || 16000
        };
        // [修正1] response_format追加でJSON出力を強制（searchモデルでサポートされている場合）
        // 注: gpt-4o-mini-search-previewはresponse_formatに非対応の可能性があるため、
        // エラー時はresponse_format無しでリトライ
        const res = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${apiKey}` },
            body: JSON.stringify(body),
            signal: controller.signal
        });
        if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message || `API Error: ${res.status}`); }
        const data = await res.json();
        data.output_text = data.choices?.[0]?.message?.content || '';
        const ann = data.choices?.[0]?.message?.annotations || [];
        data.output = [{ type:'message', content:[{ annotations: ann.map(a => ({
            type:'url_citation', url: a.url||a.url_citation?.url||'', title: a.title||a.url_citation?.title||''
        }))}]}];
        return data;
    } catch(err) {
        if (err.name === 'AbortError') throw new Error(`タイムアウト（${Math.round(timeoutMs/1000)}秒）。タイムアウト値を延長してください。`);
        throw err;
    } finally {
        // [修正7] finallyで確実にクリーンアップ
        clearTimeout(timer);
        if (signal) signal.removeEventListener('abort', onExtAbort);
    }
}

async function callResponsesAPI(apiKey, input, model, maxTok, signal, searchCtxSize, reasoningEffort) {
    const timeoutMs = (parseInt(document.getElementById('timeoutSec').value) || 120) * 1000;
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    const onExtAbort = () => controller.abort();
    if (signal) signal.addEventListener('abort', onExtAbort);

    console.log(`[API-Responses] model=${model} search_ctx=${searchCtxSize||'medium'} reasoning=${reasoningEffort||'none'} timeout=${timeoutMs}ms`);
    try {
        const body = {
            model,
            tools: [{ type:'web_search', search_context_size: searchCtxSize || 'medium', user_location:{type:'approximate',country:'JP'} }],
            input, max_output_tokens: maxTok || 16000
        };
        if (reasoningEffort) body.reasoning = { effort: reasoningEffort };
        const res = await fetch('https://api.openai.com/v1/responses', {
            method: 'POST',
            headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${apiKey}` },
            body: JSON.stringify(body),
            signal: controller.signal
        });
        if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message || `API Error: ${res.status}`); }
        const data = await res.json();
        if (!data.output_text) {
            if (data.text && typeof data.text === 'string') data.output_text = data.text;
            else if (data.text && typeof data.text === 'object' && data.text.value) data.output_text = data.text.value;
            if (!data.output_text && data.output && Array.isArray(data.output)) {
                const texts = [];
                for (const item of data.output) {
                    if (item.type === 'message' && item.content) {
                        for (const c of item.content) {
                            if (c.type === 'output_text' && c.text) texts.push(c.text);
                            else if (c.type === 'text' && c.text) texts.push(c.text);
                            else if (typeof c.text === 'string') texts.push(c.text);
                        }
                    }
                }
                if (texts.length) data.output_text = texts.join('\n');
            }
        }
        data.output_text = data.output_text || '';
        return data;
    } catch(err) {
        if (err.name === 'AbortError') throw new Error(`タイムアウト（${Math.round(timeoutMs/1000)}秒）。タイムアウト値を延長してください。`);
        throw err;
    } finally {
        // [修正7] finallyで確実にクリーンアップ
        clearTimeout(timer);
        if (signal) signal.removeEventListener('abort', onExtAbort);
    }
}

function displayRouteResult(data){
    const text=data.output_text||'';
    let routes=null;
    try{
        let cleaned = text.replace(/【[^】]*】/g, '');
        let jsonStr = cleaned;
        const m1 = cleaned.match(/```(?:json)?\s*([\s\S]*?)```/);
        if (m1) jsonStr = m1[1];
        else {
            const m2 = cleaned.match(/\{[\s\S]*?"routes"\s*:\s*\[[\s\S]*\]/);
            if (m2) {
                let s = m2[0]; let depth = 0, end = 0;
                for (let i = 0; i < s.length; i++) {
                    if (s[i] === '{') depth++;
                    else if (s[i] === '}') { depth--; if (depth === 0) { end = i + 1; break; } }
                }
                if (end > 0) jsonStr = s.slice(0, end);
            }
        }
        jsonStr = jsonStr.trim().replace(/,\s*([}\]])/g, '$1');
        const parsed = JSON.parse(jsonStr);
        if (parsed.routes && parsed.routes.length) routes = parsed;
        console.log('[Parse] JSON parse success, routes:', parsed.routes.length);
    } catch(e) { console.log('[Parse] JSON parse failed, fallback to markdown', e); }

    if(!routes){lastParsedRoutes=null;displayFallback(data);return;}
    lastParsedRoutes = routes;

    // [修正8] 到着駅の検証
    if(lastSearchParams){
        validateDestinationStation(routes, lastSearchParams.to);
    }

    renderRouteCards(routes, data);
}

// [修正8] 到着駅一致チェック
function validateDestinationStation(routes, expectedTo) {
    if (!expectedTo || !routes.routes) return;
    const normalized = expectedTo.replace(/駅$/, '');
    let mismatchFound = false;

    routes.routes.forEach((r, i) => {
        if (!r.segments || !r.segments.length) return;
        // 最後のrideセグメントのtoを確認
        const lastRide = [...r.segments].reverse().find(s => s.type === 'ride');
        if (lastRide && lastRide.to) {
            const actualTo = lastRide.to.replace(/駅$/, '');
            if (actualTo !== normalized && !actualTo.includes(normalized) && !normalized.includes(actualTo)) {
                mismatchFound = true;
                r.notes = r.notes || [];
                r.notes.unshift(`⚠ 到着駅が「${lastRide.to}」になっています。指定した「${expectedTo}」と異なる可能性があります`);
            }
        }
    });

    if (mismatchFound) {
        const existingBanner = document.querySelector('.dest-warn-banner');
        if (existingBanner) existingBanner.remove();
        const banner = document.createElement('div');
        banner.className = 'dest-warn-banner';
        banner.textContent = `⚠ 到着駅が「${expectedTo}」と一致しない結果が含まれています。駅名を確認してください。`;
        document.getElementById('results').prepend(banner);
    }
}

    const div=document.getElementById('results');
    const text=data.output_text||'';
    div.innerHTML=`<div class="result-card"><h3>検索結果</h3><div class="result-content">${mdToHtml(text)}</div>${buildCitationsHtml(data)}</div>`;
}

function buildCitationsHtml(data){
    let citations=[];
    if(data&&data.output&&Array.isArray(data.output))for(const item of data.output)if(item.type==='message'&&item.content)for(const c of item.content)if(c.annotations)for(const a of c.annotations)if(a.type==='url_citation'&&a.url)citations.push({url:a.url,title:a.title||a.url});
    if(!citations.length)return '';
    const u=[...new Map(citations.map(c=>[c.url,c])).values()];
    return `<div class="sources"><h4>参考ソース</h4>${u.map(c=>`<a href="${escapeHtml(c.url)}" target="_blank">${escapeHtml(c.title)}</a>`).join('')}</div>`;
}

function mdToHtml(md){if(!md)return '<p>結果を取得できませんでした。</p>';let h=escapeHtml(md);h=h.replace(/```[\s\S]*?```/g,m=>{const c=m.replace(/```\w*\n?/,'').replace(/```$/,'');return `<pre><code>${c}</code></pre>`;});h=h.replace(/((\|[^\n]+\|\n)+)/g,tbl=>{const rows=tbl.trim().split('\n');if(rows.length<2)return tbl;let t='<table>';rows.forEach((r,i)=>{if(r.match(/^\|[\s\-:|]+\|$/))return;const cells=r.split('|').filter((_,j,a)=>j>0&&j<a.length-1);const tag=i===0?'th':'td';t+='<tr>'+cells.map(c=>`<${tag}>${c.trim()}</${tag}>`).join('')+'</tr>';});return t+'</table>';});h=h.replace(/^####\s(.+)$/gm,'<h4>$1</h4>');h=h.replace(/^###\s(.+)$/gm,'<h3>$1</h3>');h=h.replace(/^##\s(.+)$/gm,'<h2>$1</h2>');h=h.replace(/^#\s(.+)$/gm,'<h1>$1</h1>');h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');h=h.replace(/^- (.+)$/gm,'<li>$1</li>');h=h.replace(/^(\d+)\.\s(.+)$/gm,'<li>$2</li>');h=h.replace(/((<li>.*<\/li>\n?)+)/g,'<ul>$1</ul>');h=h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');h=h.replace(/\n\n/g,'</p><p>');h='<p>'+h+'</p>';h=h.replace(/<p>\s*<\/p>/g,'');h=h.replace(/<p>\s*(<h[1-6]>)/g,'$1').replace(/(<\/h[1-6]>)\s*<\/p>/g,'$1');h=h.replace(/<p>\s*(<table>)/g,'$1').replace(/(<\/table>)\s*<\/p>/g,'$1');h=h.replace(/<p>\s*(<ul>)/g,'$1').replace(/(<\/ul>)\s*<\/p>/g,'$1');return h;}
function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function esc(s){return s==null?'':escapeHtml(String(s));}

// [修正4] 混雑度: 「推定」ラベルを追加
function renderCrowding(val){
    const n=Math.max(1,Math.min(5,parseInt(val)||3));
    const labels=['','空いている','余裕あり','普通','混雑','非常に混雑'];
    const icons=Array.from({length:5},(_,i)=>`<span class="ci${i<n?' on':''}">\u{1F9CD}</span>`).join('');
    return `<span class="crowd-bar crowd-${n}"><span class="crowd-icons">${icons}</span><span class="crowd-label">${labels[n]}</span><span class="crowd-estimate-label">（推定）</span></span>`;
}

// ===== 徒歩ナビ・コピー・共有 =====
function openWalkNav(){if(!lastSearchParams)return;window.open(`https://www.google.com/maps/dir/${encodeURIComponent(lastSearchParams.from+'駅')}/${encodeURIComponent(lastSearchParams.to+'駅')}/@?dirflg=w`,'_blank');}
function copyResult(){if(!lastResultText)return;navigator.clipboard.writeText(lastResultText).then(()=>alert('コピーしました')).catch(()=>{});}
function shareResult(){if(!lastResultText||!navigator.share){copyResult();return;}navigator.share({title:`${lastSearchParams.from}→${lastSearchParams.to}`,text:lastResultText.slice(0,500)+'...'}).catch(()=>{});}

// ===== 降車アラーム =====
function setAlarm(){if(!lastSearchParams)return;const min=prompt('到着の何分前にアラーム？','3');if(!min||isNaN(min))return;startAlarm(parseInt(min)*60,`${lastSearchParams.to}駅の${min}分前`);if('Notification' in window&&Notification.permission==='default')Notification.requestPermission();}
function startAlarm(sec,label){cancelAlarm();let rem=sec;const bar=document.getElementById('alarmBar'),tEl=document.getElementById('alarmTime'),lEl=document.getElementById('alarmLabel');bar.classList.add('active');lEl.textContent=label;function up(){tEl.textContent=`${String(Math.floor(rem/60)).padStart(2,'0')}:${String(rem%60).padStart(2,'0')}`;if(rem<=0){cancelAlarm();try{if('vibrate' in navigator)navigator.vibrate([500,200,500,200,500]);const a=new AudioContext();[800,1000,800,1000,800].forEach((f,i)=>{const o=a.createOscillator();o.frequency.value=f;o.connect(a.destination);o.start(a.currentTime+i*0.3);o.stop(a.currentTime+i*0.3+0.2);});}catch{}if('Notification' in window&&Notification.permission==='granted')new Notification('降車アラーム',{body:label+'\nまもなく到着します！'});alert(`${label}\nまもなく到着します！`);return;}rem--;}up();alarmTimer=setInterval(up,1000);}
function cancelAlarm(){if(alarmTimer){clearInterval(alarmTimer);alarmTimer=null;}document.getElementById('alarmBar').classList.remove('active');}

// ===== 旅費メモ =====
function loadExpenses(){renderExpenses(JSON.parse(localStorage.getItem('expenses')||'[]'));}
function renderExpenses(list){const bar=document.getElementById('expenseBar');if(!list.length){bar.style.display='none';return;}bar.style.display='block';document.getElementById('expenseList').innerHTML=list.map((e,i)=>`<div class="item"><span>${escapeHtml(e.label)}</span><span>¥${e.amount.toLocaleString()} <span class="del" style="cursor:pointer;color:#64748b;" onclick="removeExpense(${i})">&times;</span></span></div>`).join('');document.getElementById('expenseTotal').textContent='¥'+list.reduce((s,e)=>s+e.amount,0).toLocaleString();}
function addExpense(label,amount){const list=JSON.parse(localStorage.getItem('expenses')||'[]');list.push({label,amount,date:new Date().toISOString().split('T')[0]});localStorage.setItem('expenses',JSON.stringify(list));renderExpenses(list);}
function removeExpense(i){const list=JSON.parse(localStorage.getItem('expenses')||'[]');list.splice(i,1);localStorage.setItem('expenses',JSON.stringify(list));renderExpenses(list);}
function clearExpenses(){if(!confirm('旅費メモをクリアしますか？'))return;localStorage.removeItem('expenses');renderExpenses([]);}
function copyExpenses(){const list=JSON.parse(localStorage.getItem('expenses')||'[]');navigator.clipboard.writeText(list.map(e=>`${e.date} ${e.label}: ¥${e.amount.toLocaleString()}`).join('\n')+`\n合計: ¥${list.reduce((s,e)=>s+e.amount,0).toLocaleString()}`).then(()=>alert('コピーしました'));}
function addExpenseFromResult(){if(!lastSearchParams)return;const label=`${lastSearchParams.from}→${lastSearchParams.to}`;const a=prompt(`「${label}」の運賃（数字のみ）:`,'');if(!a||isNaN(a))return;addExpense(label,parseInt(a));}

// ===== お気に入り =====
function getFavKey(){return lastSearchParams?`${lastSearchParams.from}→${lastSearchParams.to}`:null;}
function toggleFavorite(){const key=getFavKey();if(!key)return;let favs=JSON.parse(localStorage.getItem('route_favs')||'[]');if(favs.includes(key))favs=favs.filter(f=>f!==key);else{favs.unshift(key);if(favs.length>20)favs=favs.slice(0,20);}localStorage.setItem('route_favs',JSON.stringify(favs));updateFavBtn();loadFavorites();}
function updateFavBtn(){const key=getFavKey(),btn=document.getElementById('favBtn'),favs=JSON.parse(localStorage.getItem('route_favs')||'[]');if(key&&favs.includes(key)){btn.innerHTML='&#9733; お気に入り';btn.classList.add('active');}else{btn.innerHTML='&#9734; お気に入り';btn.classList.remove('active');}}
function loadFavorites(){const favs=JSON.parse(localStorage.getItem('route_favs')||'[]'),sec=document.getElementById('favSection'),list=document.getElementById('favList');if(!favs.length){sec.style.display='none';return;}sec.style.display='block';list.innerHTML=favs.map(f=>{const[a,b]=f.split('→');return `<span class="tag fav" onclick="useFav('${ea(a)}','${ea(b)}')">${escapeHtml(f)}<span class="del" onclick="event.stopPropagation();removeFav('${ea(f)}')">&times;</span></span>`;}).join('');}
function useFav(a,b){document.getElementById('fromStation').value=a;document.getElementById('toStation').value=b;}
function removeFav(k){let f=JSON.parse(localStorage.getItem('route_favs')||'[]');f=f.filter(x=>x!==k);localStorage.setItem('route_favs',JSON.stringify(f));loadFavorites();updateFavBtn();}

// ===== 検索履歴 =====
function addHistory(a,b){let h=JSON.parse(localStorage.getItem('route_history')||'[]');const e=`${a} → ${b}`;h=h.filter(x=>x!==e);h.unshift(e);if(h.length>15)h=h.slice(0,15);localStorage.setItem('route_history',JSON.stringify(h));loadHistory();}
function loadHistory(){const h=JSON.parse(localStorage.getItem('route_history')||'[]'),sec=document.getElementById('historySection'),list=document.getElementById('historyList');if(!h.length){sec.style.display='none';return;}sec.style.display='block';list.innerHTML=h.map(x=>{const[a,b]=x.split(' → ');return `<span class="tag" onclick="useFav('${ea(a)}','${ea(b)}')">${escapeHtml(x)}</span>`;}).join('');}

// ===== [修正10] キャッシュ: 検索条件をキーに含める =====
function getCacheKey(params) {
    if (!params) return null;
    return `cache_${params.from}_${params.to}_${params.date}_${params.time}_${params.via||''}`;
}

function saveCacheWithKey(params, text, routes) {
    try {
        const key = getCacheKey(params);
        if (!key) return;
        const entry = { text, routes: routes||null, time: Date.now(), date: params.date, from: params.from, to: params.to };
        localStorage.setItem('cached_result', JSON.stringify({ key, ...entry }));
    } catch(e) { console.warn('[Cache] 保存失敗:', e.message); }
}

function loadCachedResult() {
    try {
        const c = JSON.parse(localStorage.getItem('cached_result') || 'null');
        if (!c) return;

        // [修正10] 日付が今日と異なるキャッシュは無効化
        const today = new Date().toISOString().split('T')[0];
        if (c.date && c.date !== today) {
            console.log('[Cache] 日付が異なるため無効化:', c.date, '!=', today);
            localStorage.removeItem('cached_result');
            return;
        }

        // 1時間以内のキャッシュのみ使用
        if (Date.now() - c.time > 3600000) {
            localStorage.removeItem('cached_result');
            return;
        }

        if (c.routes && c.routes.routes && c.routes.routes.length) {
            lastParsedRoutes = c.routes;
            lastResultText = c.text || '';
            renderRouteCards(c.routes, {output_text: c.text || ''});
            document.getElementById('toolbar').style.display = 'flex'; updateFavBtn();
        } else if (typeof c.text === 'string' && c.text) {
            lastResultText = c.text;
            document.getElementById('results').innerHTML = `<div class="result-card" style="opacity:0.7;"><h3>前回の検索結果（${esc(c.from||'')}→${esc(c.to||'')}）</h3><div class="result-content">${mdToHtml(c.text)}</div></div>`;
        }
    } catch(e) { console.warn('[Cache] 復元失敗:', e.message); }
}

// ===== ユーティリティ =====
function showError(msg){document.getElementById('results').innerHTML=`<div class="error-msg">${escapeHtml(msg)}</div>`;}
function ea(s){return s.replace(/'/g,"\\'").replace(/"/g,'&quot;');}

document.addEventListener('keydown',e=>{if(e.key==='Enter'&&!document.getElementById('searchBtn').disabled){const a=document.activeElement;if(['fromStation','toStation','viaStation','trainName'].includes(a.id))doSearch();}});
